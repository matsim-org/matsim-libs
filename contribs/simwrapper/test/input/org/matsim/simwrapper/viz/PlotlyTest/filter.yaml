type: plotly
datasets:
  dataset:
    file: mode_share_personTraffic.csv
    filter:
      subpopulation: person
      main_mode:
      - car
      - pt
      - ride
      share:
        conditional: ">="
        value: 0.05
      distance:
        range: true
        values:
        - 0.05
        - 0.3
      dist_group:
        invert: true
        values:
        - 20000+
traces:
- x: $dataset.dist_group
  "y": $dataset.share
  orientation: v
  type: bar
